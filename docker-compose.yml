version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agrointel-postgres
    environment:
      POSTGRES_USER: agrointel_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: agrointel_db
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrointel_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrointel-network

  # InfluxDB for Time-series Data
  influxdb:
    image: influxdb:2.7-alpine
    container_name: agrointel-influxdb
    environment:
      INFLUXDB_DB: agrointel_timeseries
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin_password_123
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrointel-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agrointel-redis
    command: redis-server --requirepass redis_password_123 --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrointel-network

  # RabbitMQ for Message Queue (Celery)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: agrointel-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agrointel
      RABBITMQ_DEFAULT_PASS: rabbitmq_password_123
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrointel-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrointel-backend
    environment:
      DATABASE_URL: postgresql://agrointel_user:secure_password_123@postgres:5432/agrointel_db
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: admin_password_123
      REDIS_URL: redis://:redis_password_123@redis:6379/0
      RABBITMQ_URL: amqp://agrointel:rabbitmq_password_123@rabbitmq:5672/
      JWT_SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - agrointel-network

  # Celery Worker for Background Tasks & ML Training
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrointel-celery-worker
    environment:
      DATABASE_URL: postgresql://agrointel_user:secure_password_123@postgres:5432/agrointel_db
      INFLUXDB_URL: http://influxdb:8086
      REDIS_URL: redis://:redis_password_123@redis:6379/0
      RABBITMQ_URL: amqp://agrointel:rabbitmq_password_123@rabbitmq:5672/
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    command: celery -A tasks worker --loglevel=info --concurrency=4
    networks:
      - agrointel-network

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrointel-celery-beat
    environment:
      DATABASE_URL: postgresql://agrointel_user:secure_password_123@postgres:5432/agrointel_db
      RABBITMQ_URL: amqp://agrointel:rabbitmq_password_123@rabbitmq:5672/
      REDIS_URL: redis://:redis_password_123@redis:6379/0
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    command: celery -A tasks beat --loglevel=info
    networks:
      - agrointel-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: agrointel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - agrointel-network

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: agrointel-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - agrointel-network

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: agrointel-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_password_123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - agrointel-network

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  agrointel-network:
    driver: bridge

# To run: docker-compose up -d
# To view logs: docker-compose logs -f [service_name]
# To stop: docker-compose down
# To rebuild: docker-compose up -d --build
